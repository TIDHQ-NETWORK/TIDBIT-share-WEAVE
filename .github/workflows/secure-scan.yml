name: Secure Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "21 4 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

jobs:
  secureci:
    uses: TIDHQ-NETWORK/TID-SecureCI/.github/workflows/tid-secureci.yml@3ad598f9c3292797b19e7ffe2122dd803019b856
    secrets: inherit
    with:
      enforce: true
      fail_severity: HIGH,CRITICAL
